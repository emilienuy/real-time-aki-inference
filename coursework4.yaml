apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aki-detection-state
  namespace: gateshead
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: managed-csi
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aki-detection
  namespace: gateshead
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: aki-detection
  template:
    metadata:
      labels:
        app: aki-detection
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: aki-detection
        image: imperialswemlsspring2026.azurecr.io/coursework6-gateshead
        command: ["python3", "-m", "src.main"]
        env:
        - name: MLLP_ADDRESS
          value: gateshead-simulator.coursework6:8440
        - name: PAGER_ADDRESS
          value: gateshead-simulator.coursework6:8441
        - name: HISTORY_CSV
          value: /data/history.csv
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: METRICS_PORT
          value: "8000"
        ports:
        - name: metrics
          containerPort: 8000
        volumeMounts:
          - mountPath: "/data"
            name: hospital-history
            readOnly: true
          - mountPath: "/state"
            name: aki-detection-state
        resources:
          requests:
            memory: 1G
            cpu: "500m"
        # Restart the pod if it stops responding on the metrics port
        livenessProbe:
          httpGet:
            path: /metrics
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
      initContainers:
      - name: copy-hospital-history
        image: imperialswemlsspring2026.azurecr.io/coursework6-history
        volumeMounts:
          - mountPath: "/data"
            name: hospital-history
        resources:
          requests:
            memory: 1G
            cpu: "500m"
      volumes:
      - name: hospital-history
        emptyDir:
          sizeLimit: 50Mi
      - name: aki-detection-state
        persistentVolumeClaim:
          claimName: aki-detection-state
---
# Prometheus can discover the pod by job name
apiVersion: v1
kind: Service
metadata:
  name: aki-detection
  namespace: gateshead
  labels:
    app: aki-detection
    group: gateshead
spec:
  selector:
    app: aki-detection
  ports:
  - name: metrics
    port: 8000
    targetPort: 8000